scan_timeout = 100
command_timeout = 500

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
follow_symlinks = false

format = """
$directory\
$fill\
${custom.docker_context}\
$c$rust$golang$nodejs$php$java$python\
$git_branch\
$git_status\
$line_break\
$character\
"""

[fill]
style = "white"

[directory]
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "Óįõ "
"Pictures" = "ÔÄĺ "
"Imagens" = "ÔÄĺ "
"Dev" = "ůį≤č "
"Others" = "Ôáź "

[line_break] 
disabled = false

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:green)'
error_symbol = '[‚ĚĮ](bold fg:red)'
vimcmd_symbol = '[‚Ěģ](bold fg:green)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_visual_symbol = '[‚Ěģ](bold fg:yellow)'

[git_branch] 
symbol = "[Óā∂](white)Ôźė "
style = "fg:red bg:white"
format =  '  [$symbol$branch]($style)[Óāī](white)'

[git_status]
format = '[ $staged$modified$renamed$deleted$untracked$conflicted$ahead_behind ]($style)'
staged     = '[+${count}](green)'
modified   = '[!${count}](yellow)'
renamed    = '[¬Ľ${count}](blue)'
deleted    = '[-${count}](red)'
untracked  = '[?${count}](bright-magenta)'
stashed    = '[‚Č°${count}](bright-cyan)'
conflicted = '[‚úĖ${count}](red bold)'

ahead      = '[‚á°${count}](teal)'
behind     = '[‚á£${count}](peach)'
diverged   = '[‚áē‚á°${ahead_count}‚á£${behind_count}](mauve)'

[custom.docker_context]
command = "docker context show"
when = "test \"$(docker context show)\" != \"default\""
format = "ūüź≥ [$output]($style) "
style = "bold blue"
shell = ["sh"]


[rust]
symbol = "Óě®"
format = "[ $symbol]($style)"

[nodejs]
